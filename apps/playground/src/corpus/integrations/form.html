<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
<style>
  body {
    margin: 0;
    padding: 48px;
    background: #fafafa;
    font-family: Inter, sans-serif;
  }
  .form {
    max-width: 360px;
    background: white;
    padding: 32px;
    border-radius: 12px;
    border: 1px solid #e4e4e7;
  }
  .form h2 {
    margin: 0 0 24px;
    font-size: 20px;
    color: #18181b;
  }
  .form label {
    display: block;
    font-size: 13px;
    color: #52525b;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #d4d4d8;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 16px;
    box-sizing: border-box;
  }
  .form button {
    width: 100%;
    padding: 10px;
    background: #18181b;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
</style>
<form class="form">
  <h2>Sign in</h2>
  <label>Email</label>
  <input type="email" placeholder="you@example.com" />
  <label>Password</label>
  <input type="password" placeholder="••••••••" />
  <button type="button">Continue</button>
</form>
