<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
<style>
  body { margin: 0; padding: 32px; background: #fafafa; font-family: Inter, sans-serif; color: #18181b; }
  .form { max-width: 360px; background: white; padding: 28px; border-radius: 12px; border: 1px solid #e4e4e7; display: flex; flex-direction: column; gap: 14px; }
  .form h2 { margin: 0 0 4px; font-size: 18px; font-weight: 700; }
  label { display: block; font-size: 12px; font-weight: 600; color: #52525b; }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d4d4d8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    box-sizing: border-box;
    background: white;
  }
  textarea { min-height: 88px; resize: none; }
  button {
    padding: 10px 14px;
    background: #18181b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .hint { font-size: 12px; color: #71717a; }
</style>
<form class="form">
  <h2>Reach out</h2>
  <div>
    <label>Email</label>
    <input type="email" placeholder="you@example.com" />
  </div>
  <div>
    <label>Name</label>
    <input type="text" placeholder="Full name" />
  </div>
  <div>
    <label>Message</label>
    <textarea placeholder="What would you like to ask?"></textarea>
  </div>
  <button type="button">Send</button>
  <span class="hint">We typically respond within a day.</span>
</form>
