<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
<style>
  body { margin: 0; padding: 32px; background: #fafafa; font-family: Inter, sans-serif; color: #18181b; }
  .container { position: relative; width: 480px; height: 280px; background: white; border: 1px solid #e4e4e7; border-radius: 12px; }
  .tl, .tr, .bl, .br, .c {
    position: absolute;
    padding: 6px 10px;
    background: #18181b;
    color: white;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  .tl { top: 12px; left: 12px; }
  .tr { top: 12px; right: 12px; }
  .bl { bottom: 12px; left: 12px; }
  .br { bottom: 12px; right: 12px; background: #f97316; }
  .c  { top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2563eb; }
  .badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 24px; height: 24px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .card { position: relative; display: inline-block; padding: 16px 20px; background: white; border: 1px solid #e4e4e7; border-radius: 8px; margin-top: 32px; }
</style>
<div class="container">
  <div class="tl">top-left</div>
  <div class="tr">top-right</div>
  <div class="bl">bottom-left</div>
  <div class="br">bottom-right (MAX)</div>
  <div class="c">centered</div>
</div>
<div class="card">
  Card with badge
  <div class="badge">3</div>
</div>
