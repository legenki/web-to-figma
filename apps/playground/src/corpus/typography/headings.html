<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<style>
  body {
    margin: 0;
    padding: 48px;
    background: #ffffff;
    font-family: Inter, sans-serif;
    color: #18181b;
  }
  .stack { display: flex; flex-direction: column; gap: 16px; max-width: 720px; }
  h1 { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
  h2 { font-size: 40px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
  h3 { font-size: 28px; font-weight: 600; margin: 0; }
  h4 { font-size: 20px; font-weight: 500; margin: 0; }
  h5 { font-size: 16px; font-weight: 500; margin: 0; color: #52525b; }
  h6 { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #71717a; margin: 0; }
  p  { font-size: 16px; font-weight: 400; line-height: 1.6; margin: 0; color: #3f3f46; }
  .light { font-weight: 300; }
</style>
<div class="stack">
  <h6>Eyebrow</h6>
  <h1>Heading one</h1>
  <h2>Heading two</h2>
  <h3>Heading three</h3>
  <h4>Heading four</h4>
  <h5>Heading five</h5>
  <p>Body paragraph at 16px with a 1.6 line height — the default for long-form content.</p>
  <p class="light">A lighter weight (300) for secondary copy.</p>
</div>
