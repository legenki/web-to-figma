<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
<style>
  body { margin: 0; padding: 32px; background: #ffffff; font-family: Inter, sans-serif; color: #18181b; }
  .stack { display: flex; flex-direction: column; gap: 32px; max-width: 720px; }
  .group .label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #71717a; margin-bottom: 8px; }
  .panel { background: #fafafa; border: 1px solid #e4e4e7; border-radius: 12px; padding: 16px; }
  .item { background: #18181b; color: white; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .row { display: flex; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .between { display: flex; justify-content: space-between; align-items: center; }
  .center { display: flex; align-items: center; justify-content: center; gap: 8px; height: 80px; }
  .grow .a { background: #f97316; }
  .grow .b { flex: 1; background: #18181b; }
</style>
<div class="stack">
  <div class="group">
    <span class="label">Row</span>
    <div class="panel"><div class="row"><div class="item">One</div><div class="item">Two</div><div class="item">Three</div></div></div>
  </div>
  <div class="group">
    <span class="label">Column</span>
    <div class="panel"><div class="col"><div class="item">One</div><div class="item">Two</div></div></div>
  </div>
  <div class="group">
    <span class="label">Justify space-between</span>
    <div class="panel"><div class="between"><div class="item">Left</div><div class="item">Right</div></div></div>
  </div>
  <div class="group">
    <span class="label">Align center</span>
    <div class="panel"><div class="center"><div class="item">Centered</div></div></div>
  </div>
  <div class="group">
    <span class="label">flex-grow child fills</span>
    <div class="panel"><div class="row grow"><div class="item a">Fixed</div><div class="item b">flex: 1</div></div></div>
  </div>
</div>
