<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
<style>
  body { margin: 0; padding: 32px; background: #18181b; font-family: Inter, sans-serif; color: white; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 560px; }
  .swatch { aspect-ratio: 4/3; border-radius: 16px; display: flex; align-items: flex-end; padding: 16px; font-size: 12px; font-weight: 600; }
  .a { background: radial-gradient(circle at 30% 30%, #f97316, #18181b 70%); }
  .b { background: radial-gradient(ellipse at center, #6366f1, transparent); }
  .c { background: radial-gradient(circle at top right, #10b981, #2563eb); }
  .d { background: conic-gradient(from 45deg, #ef4444, #f59e0b, #84cc16, #06b6d4, #8b5cf6, #ef4444); }
</style>
<div class="grid">
  <div class="swatch a">radial circle, off-center</div>
  <div class="swatch b">radial ellipse, transparent</div>
  <div class="swatch c">radial corner anchor</div>
  <div class="swatch d">conic-gradient</div>
</div>
