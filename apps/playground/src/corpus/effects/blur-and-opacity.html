<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
<style>
  body {
    margin: 0; padding: 48px; min-height: 100vh;
    background: linear-gradient(135deg, #f97316, #db2777 60%, #6366f1);
    font-family: Inter, sans-serif; color: white;
  }
  .row { display: flex; gap: 24px; flex-wrap: wrap; }
  .glass {
    width: 220px; padding: 24px; border-radius: 16px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.25);
  }
  .glass h3 { margin: 0 0 8px; font-size: 18px; font-weight: 800; }
  .glass p  { margin: 0; font-size: 13px; line-height: 1.5; opacity: 0.85; }
  .filter-blur { filter: blur(2px); }
  .faded { opacity: 0.4; }
  .full { opacity: 1; }
  .label { display: block; font-size: 11px; opacity: 0.7; margin-top: 12px; }
</style>
<div class="row">
  <div class="glass">
    <h3>Backdrop blur</h3>
    <p>backdrop-filter: blur(20px) on a semi-transparent surface.</p>
  </div>
  <div class="glass filter-blur">
    <h3>filter: blur(2px)</h3>
    <p>The element itself is blurred, including its text.</p>
  </div>
  <div class="glass faded">
    <h3>opacity 0.4</h3>
    <p>The whole element faded.</p>
    <span class="label">faded</span>
  </div>
  <div class="glass full">
    <h3>opacity 1</h3>
    <p>Reference card at full opacity.</p>
    <span class="label">full</span>
  </div>
</div>
